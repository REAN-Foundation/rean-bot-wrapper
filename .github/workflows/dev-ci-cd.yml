# This workflow will trigger pull requests and apply a label based on the
# paths that are modified in the pull request.
#
# To use this workflow, you will need to set up a .github/labeler.yml
# file with configuration.  For more information, see:
# https://github.com/actions/labeler

name: Dev-CI-CD

on:
  # Triggers the workflow on push events but only for the develop branch
  push:
    branches: [develop]

jobs:
  Build-Push-Harbor:
    environment: dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Declare some variables
        id: vars
        shell: bash
        run: |
          echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/} | sed "s/\\//-/g")"
          echo "::set-output name=sha_short::$(git rev-parse --short HEAD)"
          echo "::set-output name=repo_name::$(echo "$GITHUB_REPOSITORY" | awk -F / '{print $2}')"

      - name: Another step
        run: |
          echo "Branch: ${{ steps.vars.outputs.branch }}"
          echo "Sha: ${{ steps.vars.outputs.sha_short }}"
          echo "Repo: ${{ steps.vars.outputs.repo_name }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          context: ./
          file: ./Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/rean-bot-dev-uat:${{ steps.vars.outputs.branch }}_${{ steps.vars.outputs.sha_short }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

      # Mirror the freshly-pushed ECR image into Harbor (Harbor PULLS it, so no
      # slow upload) and keep only the 5 latest. Additive: does not touch the
      # ECR push or the ECS deploy below. continue-on-error so a Harbor hiccup
      # never blocks the ECS deployment.
      - name: Mirror image to Harbor (keep 5 latest)
        continue-on-error: true
        shell: bash
        env:
          HARBOR: https://artifacts.reanfoundation.org
          HARBOR_ROBOT: ${{ secrets.HARBOR_ROBOT }}
          HARBOR_ROBOT_SECRET: ${{ secrets.HARBOR_ROBOT_SECRET }}
          ECR_REPO: rean-bot-dev-uat
          TAG: ${{ steps.vars.outputs.branch }}_${{ steps.vars.outputs.sha_short }}
          HARBOR_PROJECT: rean-dev
          ECR_REGISTRY_ID: "1"
          RETENTION_ID: "2"
        run: |
          set -euo pipefail
          A=(-u "${HARBOR_ROBOT}:${HARBOR_ROBOT_SECRET}")
          POL="ci-${ECR_REPO}"
          BODY="{\"name\":\"${POL}\",\"src_registry\":{\"id\":${ECR_REGISTRY_ID}},\"dest_namespace\":\"${HARBOR_PROJECT}\",\"dest_namespace_replace_count\":0,\"trigger\":{\"type\":\"manual\"},\"filters\":[{\"type\":\"name\",\"value\":\"${ECR_REPO}\"},{\"type\":\"tag\",\"value\":\"${TAG}\"}],\"enabled\":true,\"override\":true,\"speed\":-1}"
          # find-or-create this repo's pull policy, pinned to the exact tag we just pushed
          PID=$(curl -sk "${A[@]}" "${HARBOR}/api/v2.0/replication/policies?q=name%3D${POL}" | jq -r '.[0].id // empty')
          if [ -z "$PID" ]; then
            PID=$(curl -sk "${A[@]}" -X POST -H 'Content-Type: application/json' -d "$BODY" -D - -o /dev/null "${HARBOR}/api/v2.0/replication/policies" | awk 'tolower($1)=="location:"{print $2}' | tr -d '\r' | awk -F/ '{print $NF}')
          else
            curl -sk "${A[@]}" -X PUT -H 'Content-Type: application/json' -d "$BODY" "${HARBOR}/api/v2.0/replication/policies/${PID}"
          fi
          echo "Harbor pull policy id: $PID"
          # trigger Harbor to pull ONLY this tag, wait for it
          EX=$(curl -sk "${A[@]}" -X POST -H 'Content-Type: application/json' -d "{\"policy_id\":${PID}}" -D - -o /dev/null "${HARBOR}/api/v2.0/replication/executions" | awk 'tolower($1)=="location:"{print $2}' | tr -d '\r' | awk -F/ '{print $NF}')
          for i in $(seq 1 60); do
            ST=$(curl -sk "${A[@]}" "${HARBOR}/api/v2.0/replication/executions/${EX}" | jq -r .status)
            echo "  replication: $ST"; [ "$ST" = "Succeed" ] && break
            [ "$ST" = "Failed" ] && { echo "replication failed"; exit 1; }
            sleep 5
          done
          # keep only the 5 latest in Harbor for this repo
          curl -sk "${A[@]}" -X POST -H 'Content-Type: application/json' -d '{"dry_run":false}' "${HARBOR}/api/v2.0/retentions/${RETENTION_ID}/executions"
          echo "Mirrored ${ECR_REPO}:${TAG} to Harbor (${HARBOR_PROJECT}); triggered keep-5."
